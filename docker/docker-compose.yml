version: "3.9"

services:
  nginx:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - agenthub

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      - DATABASE_URL=postgresql+psycopg://agenthub:agenthub_secret@postgres:5432/agenthub
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - agenthub
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-agenthub}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-agenthub_secret}
      - POSTGRES_DB=${POSTGRES_DB:-agenthub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agenthub
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenthub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - agenthub

networks:
  agenthub:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_storage:
