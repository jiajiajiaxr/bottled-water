name: Deploy platform demo to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/pages-platform-demo.yml
      - platform-demo/public/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-platform-demo
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare site payload
        shell: bash
        run: |
          set -euo pipefail
          rm -rf site
          mkdir -p site/platform-demo
          cp -R platform-demo/public/. site/platform-demo/
          touch site/.nojekyll
          cat > site/index.html <<'EOF'
          <!doctype html>
          <html lang="zh-CN">
            <head>
              <meta charset="UTF-8" />
              <meta http-equiv="refresh" content="0; url=./platform-demo/" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>AgentHub Demo</title>
            </head>
            <body>
              <p>Redirecting to <a href="./platform-demo/">platform demo</a>...</p>
            </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
